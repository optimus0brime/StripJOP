# CRA-Detector Configuration
# Tunable thresholds, disassembly preferences, and output options

# -------------------------------
# Detection Sensitivity
# -------------------------------
STEP_UP_VALUE=20          # Score increment for indirect jmp/call
STEP_DOWN_VALUE=1         # Score decrement for other instructions
DIST_THRESHOLD=4196       # Minimum jump distance to count gadget
JOP_THRESHOLD=120         # Alarm threshold for cumulative score

# -------------------------------
# Disassembly Preferences
# -------------------------------
DISASSEMBLER_PRIORITY=("objdump" "radare2" "capstone")
CAPSTONE_SYNTAX="intel"

# -------------------------------
# Memory Extraction Options
# -------------------------------
USE_GDB=1                # Prefer GDB memory extraction (1=yes, 0=no)
USE_PROC_MEM=1           # Fallback to /proc/[pid]/mem

# -------------------------------
# Output Options
# -------------------------------
OUTPUT_DIR="./cra_output"
JSON_OUTPUT="${OUTPUT_DIR}/cra_report.json"
LOG_FILE="${OUTPUT_DIR}/cra.log"
TEMP_DIR="/tmp/cra_detector_$$"

# -------------------------------
# Gadget Scoring
# -------------------------------
GADGET_LENGTH_PENALTY=(30 20 10 0)   # ≤5, 6-10, 11-15, >15
REGISTER_REUSE_SCORE=(0 5 10 15)     # 1,2,3-4,>4 unique registers
STACK_OP_SCORE=(0 10 15 20)          # 0,1,2,3+ stack ops
MEMORY_OP_SCORE=(0 10 20 25)         # 0,1,2,3+ mem ops
BRANCH_OP_SCORE=(0 5 10)             # 2,3+ branches
ATTACK_TYPE_BONUS_ROP=20
ATTACK_TYPE_BONUS_JOP=30
ATTACK_TYPE_BONUS_COP=25
